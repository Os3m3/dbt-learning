services:
  postgres:
    image: postgres:16
    container_name: dbt_postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5437:5432"
    volumes:
      - dbt_pgdata:/var/lib/postgresql/data

volumes:
  dbt_pgdata:
